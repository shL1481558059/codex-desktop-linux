name: Build Codex Desktop Linux

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  UPSTREAM_DMG_URL: https://persistent.oaistatic.com/codex-app-prod/ChatGPT.dmg
  UPSTREAM_DMG_PATH: /tmp/codex-upstream-ci/Codex.dmg

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install apt packages
      run: |
        sudo apt update

        sudo apt install -y \
          build-essential \
          git \
          curl \
          wget \
          jq \
          unzip \
          zip \
          p7zip-full \
          fuse3 \
          libfuse2 \
          dpkg-dev \
          fakeroot \
          rpm

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install project dependencies
      run: |
        bash scripts/install-deps.sh

    - name: Validate repository
      run: |
        set -euo pipefail

        bash -n install.sh
        bash -n scripts/lib/*.sh
        bash -n launcher/start.sh.template
        bash -n scripts/build-deb.sh scripts/build-rpm.sh scripts/build-pacman.sh scripts/build-appimage.sh
        cargo fmt --check
        bash tests/scripts_smoke.sh

    - name: Download upstream DMG
      run: |
        mkdir -p "$(dirname "$UPSTREAM_DMG_PATH")"
        curl -fL --retry 3 -o "$UPSTREAM_DMG_PATH" "$UPSTREAM_DMG_URL"

    - name: Build app from DMG
      env:
        CODEX_ACCEPTANCE_OVERRIDE: '1'
        CODEX_LINUX_ENABLE_COMPUTER_USE_UI: '1'
      run: |
        export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
        make build-app DMG="$UPSTREAM_DMG_PATH"

    - name: Build
      run: |
        export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"

        make package

    - name: List output
      run: |
        find dist -type f
        find dist-next -type f || true

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: codex-deb
        path: |
          dist/**/*.deb
          dist/*.deb
          dist-next/**/*.deb

    - name: Upload rpm
      uses: actions/upload-artifact@v4
      with:
        name: codex-rpm
        path: |
          dist/**/*.rpm
          dist/*.rpm
          dist-next/**/*.rpm

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: codex-appimage
        path: |
          dist/**/*.AppImage
          dist/*.AppImage
          dist-next/**/*.AppImage

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: |
          dist-next/rebuild/**
